name: Generate Marketplace

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  generate-marketplace:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Discover plugins and generate marketplace.json
        run: |
          # Find all directories containing .claude-plugin/plugin.json
          PLUGINS_JSON="[]"

          while IFS= read -r plugin_json; do
            PLUGIN_DIR=$(dirname "$(dirname "$plugin_json")")
            # Path relative to repo root
            REL_PATH="./${PLUGIN_DIR}"

            NAME=$(jq -r '.name // empty' "$plugin_json")
            DESC=$(jq -r '.description // ""' "$plugin_json")
            KEYWORDS=$(jq -c '.keywords // ["posthog"]' "$plugin_json")

            if [ -z "$NAME" ]; then
              echo "::warning::Skipping $plugin_json — missing 'name' field"
              continue
            fi

            echo "  Found plugin: $NAME ($REL_PATH)"

            PLUGINS_JSON=$(echo "$PLUGINS_JSON" | jq \
              --arg name "$NAME" \
              --arg source "$REL_PATH" \
              --arg desc "$DESC" \
              --argjson keywords "$KEYWORDS" \
              '. + [{name: $name, source: $source, description: $desc, keywords: $keywords}]')
          done < <(find skills -path '*/.claude-plugin/plugin.json' -type f | sort)

          PLUGIN_COUNT=$(echo "$PLUGINS_JSON" | jq 'length')
          echo "Discovered $PLUGIN_COUNT plugins"

          if [ "$PLUGIN_COUNT" -eq 0 ]; then
            echo "::warning::No plugins found, skipping marketplace generation"
            exit 0
          fi

          # Generate marketplace.json
          mkdir -p .claude-plugin
          jq -n \
            --argjson plugins "$PLUGINS_JSON" \
            '{
              name: "posthog-skills",
              owner: { name: "PostHog" },
              metadata: {
                description: "PostHog skills for Claude Code — analytics, feature flags, error tracking, and more"
              },
              plugins: $plugins
            }' > .claude-plugin/marketplace.json

          echo "Generated .claude-plugin/marketplace.json with $PLUGIN_COUNT plugins"
          cat .claude-plugin/marketplace.json

      - name: Commit marketplace.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "No changes to marketplace.json"
          else
            git commit -m "Update marketplace.json (auto-discovered plugins)"
            git push
          fi
