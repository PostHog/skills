name: Generate Marketplace

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  generate-marketplace:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Discover plugins and generate marketplace.json
        run: ./scripts/generate-marketplace.sh

      - name: Create PR if marketplace.json changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          if git diff --cached --quiet; then
            echo "No changes to marketplace.json"
            exit 0
          fi

          BRANCH="auto/update-marketplace"
          git checkout -B "$BRANCH"
          git commit -m "Update marketplace.json (auto-discovered plugins)"
          git push -f origin "$BRANCH"

          # Create PR if one doesn't already exist
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq 'length')
          if [ "$EXISTING" -eq 0 ]; then
            gh pr create \
              --title "Update marketplace.json" \
              --body "Auto-generated by the marketplace discovery workflow. Merge to update the plugin catalog." \
              --head "$BRANCH" \
              --base main
          else
            echo "PR already exists, updated branch"
          fi
